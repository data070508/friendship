<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memory Book ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>Our Memory Book ❤️</h1>
        <p>
            A journey of laughter, adventures and
            unforgettable moments
        </p>

        <div id="friendship-counter">
            Friends for <span id="days"></span> days
        </div>

        <a href="#timeline" class="btn">
            Start Our Journey
        </a>
    </div>
</header>


<nav>
    <a href="#timeline">Timeline</a>
    <a href="#gallery">Gallery</a>
    <a href="#friends">Friends</a>
    <a href="#scrapbook">Scrapbook</a>
    <a href="#capsule">Time Capsule</a>
</nav>


<section id="timeline">
    <h2>📅 Our Memories</h2>

    <div id="memory-container">
        Loading memories...
    </div>
</section>


<section id="gallery">
    <h2>📸 Highlights</h2>

    <div id="gallery-container">
    </div>
</section>


<section id="friends">
    <h2>👥 Our Gang</h2>

    <div id="friends-container">
    </div>
</section>


<section id="scrapbook">
    <h2>📖 Scrapbook</h2>

    <div id="scrapbook-container">
    </div>
</section>


<section id="capsule">
    <h2>🔒 Time Capsule</h2>

    <div id="capsule-container">
    </div>
</section>


<footer>
    Made with ❤️ by Friends Forever
</footer>


<script src="app.js"></script>

</body>
</html>
